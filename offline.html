<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICF Collect — Offline</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Oswald',Arial,sans-serif;
  background:linear-gradient(155deg,#002952,#004080,#005a9e);
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:24px;
}
.card{
  background:#fff;border-radius:20px;padding:40px 32px;
  text-align:center;max-width:400px;width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  border-top:5px solid #c8991a;
}
.icon{font-size:64px;margin-bottom:16px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
h1{color:#004080;font-size:24px;font-weight:700;letter-spacing:.8px;margin-bottom:12px;}
p{color:#555;font-size:14px;line-height:1.7;margin-bottom:28px;}
.btn{
  background:#004080;color:#fff;border:none;
  padding:13px 36px;font-size:14px;font-weight:700;
  font-family:'Oswald',Arial,sans-serif;
  border-radius:30px;cursor:pointer;letter-spacing:.8px;
  transition:all .25s;display:inline-block;
}
.btn:hover{background:#003060;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,64,128,.4);}
.status{
  margin-top:20px;padding:12px 16px;background:#f0f4f8;
  border-radius:8px;font-size:12px;color:#607080;letter-spacing:.3px;
}
.status.online{background:#e8f5e9;color:#2e7d32;}
.note{margin-top:16px;font-size:11px;color:#aaa;line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>YOU'RE OFFLINE</h1>
  <p>No internet connection detected. Any data you have already entered is saved locally and will sync automatically when you reconnect.</p>
  <button class="btn" onclick="checkConnection()">TRY AGAIN</button>
  <div class="status" id="status">Checking connection…</div>
  <div class="note">ICF-SL · ITN Distribution Data Collection</div>
</div>
<script>
function checkConnection() {
  if (navigator.onLine) {
    window.location.href = './index.html';
  } else {
    const s = document.getElementById('status');
    s.textContent = 'Still offline — check your network and try again.';
    s.className = 'status';
  }
}
window.addEventListener('online', () => {
  const s = document.getElementById('status');
  s.textContent = 'Connection restored! Redirecting…';
  s.className = 'status online';
  setTimeout(() => window.location.href = './index.html', 1200);
});
// Initial status
document.getElementById('status').textContent = navigator.onLine
  ? 'Connection available — click Try Again.'
  : 'No connection detected.';
</script>
</body>
</html>
